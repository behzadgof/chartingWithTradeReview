<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORB Charts</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #0d1117; }

/* Tab bar */
.tab-bar {
  display: flex;
  align-items: center;
  background: #161b22;
  padding: 0 12px;
  border-bottom: 1px solid #30363d;
  height: 36px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  user-select: none;
}
.tab {
  padding: 8px 18px;
  color: #8b949e;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s;
}
.tab:hover:not(.disabled) { color: #c9d1d9; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.tab.disabled { color: #484f58; cursor: not-allowed; }

/* Iframe container */
.frame-container {
  position: absolute;
  top: 36px;
  left: 0; right: 0; bottom: 0;
}
.frame-container iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* Context menu */
.ctx-menu {
  display: none;
  position: absolute;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 4px 0;
  z-index: 1000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
}
.ctx-menu-item {
  padding: 6px 16px;
  color: #c9d1d9;
  cursor: pointer;
  white-space: nowrap;
}
.ctx-menu-item:hover { background: #21262d; }
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab active" id="tab-market" onclick="switchTab('market')" oncontextmenu="showCtxMenu(event, 'market')">Market</div>
  <div class="tab" id="tab-trades" onclick="switchTab('trades')" oncontextmenu="showCtxMenu(event, 'trades')">Trades</div>
</div>

<div class="frame-container">
  <iframe id="frame-market" src="/market"></iframe>
  <iframe id="frame-trades" src="/trades" style="visibility:hidden;z-index:0"></iframe>
</div>

<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-menu-item" id="ctx-menu-default" onclick="setDefault()">Set as default</div>
</div>

<script>
var hasTrades = {{HAS_TRADES}};
var activeTab = 'market';
var ctxTarget = null;

var tabMarket = document.getElementById('tab-market');
var tabTrades = document.getElementById('tab-trades');
var frameMarket = document.getElementById('frame-market');
var frameTrades = document.getElementById('frame-trades');
var ctxMenu = document.getElementById('ctx-menu');

// Disable trades tab if no trade data
if (!hasTrades) {
  tabTrades.classList.add('disabled');
  tabTrades.title = 'No trades loaded';
}

function switchTab(tab) {
  if (tab === 'trades' && !hasTrades) return;
  activeTab = tab;
  frameMarket.style.visibility = (tab === 'market') ? 'visible' : 'hidden';
  frameMarket.style.zIndex = (tab === 'market') ? '1' : '0';
  frameTrades.style.visibility = (tab === 'trades') ? 'visible' : 'hidden';
  frameTrades.style.zIndex = (tab === 'trades') ? '1' : '0';
  tabMarket.className = 'tab' + (tab === 'market' ? ' active' : '');
  tabTrades.className = 'tab' + (tab === 'trades' ? ' active' : '') + (!hasTrades ? ' disabled' : '');
}

// Context menu
function showCtxMenu(e, tab) {
  e.preventDefault();
  ctxTarget = tab;
  ctxMenu.style.display = 'block';
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = e.clientY + 'px';
}

document.addEventListener('click', function() { ctxMenu.style.display = 'none'; });

function setDefault() {
  if (!ctxTarget) return;
  ctxMenu.style.display = 'none';
  fetch('/api/state', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: 'default_tab', value: ctxTarget })
  });
  // Brief visual confirmation — flash a checkmark
  var tab = ctxTarget === 'market' ? tabMarket : tabTrades;
  var orig = tab.textContent;
  tab.textContent = orig + ' \u2713';
  setTimeout(function() { tab.textContent = orig; }, 1200);
}

// Load default tab preference on startup
fetch('/api/state?key=default_tab')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var pref = data && data.value;
    if (pref === 'trades' && hasTrades) switchTab('trades');
    else if (pref === 'market') switchTab('market');
    // else keep default (market)
  })
  .catch(function() {});
</script>
</body>
</html>
